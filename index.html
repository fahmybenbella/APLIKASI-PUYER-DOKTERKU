<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puyer Pro v5.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Puyer Pro v5.0</h2>
        <div class="subtitle">Klinik & Apotek Digital</div>
        
        <div class="header-grid">
            <div>
                <label>Nama Pasien</label>
                <input type="text" id="namaPasien" placeholder="Nama Anak">
            </div>
            <div>
                <label>BB (kg)</label>
                <input type="number" id="bb" placeholder="0" step="0.1">
            </div>
            <div>
                <label>Jml Puyer</label>
                <input type="number" id="jmlBungkus" placeholder="0">
            </div>
        </div>

        <hr>
        
        <label>Komposisi Obat</label>
        <div id="drugList">
            </div>

        <div class="actions">
            <button class="btn-add" onclick="addDrugRow()">+ Tambah Obat</button>
            <button class="btn-calc" onclick="hitungSemua()">HITUNG</button>
        </div>
    </div>

    <div id="resultCard" class="result-card">
        <h3>Hasil Perhitungan:</h3>
        <p id="resHeader"></p>
        <table>
            <thead>
                <tr>
                    <th>NAMA OBAT</th>
                    <th>DOSIS/BKS</th>
                    <th style="text-align: right;">AMBIL</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
